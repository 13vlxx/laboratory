apiVersion: apps/v1
kind: Deployment
metadata:
  name: n8n
  namespace: alex-n8n
  labels:
    app: n8n
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: n8n
  template:
    metadata:
      labels:
        app: n8n
    spec:
      securityContext:
        fsGroup: 1000
        runAsUser: 1000
        runAsGroup: 1000
      containers:
        - name: n8n
          image: n8nio/n8n:latest
          ports:
            - containerPort: 5678
          env:
            - name: N8N_HOST
              value: "0.0.0.0"
            - name: N8N_PORT
              value: "5678"
            - name: N8N_PROTOCOL
              value: "http"
            - name: GENERIC_TIMEZONE
              value: "Europe/Paris"
            - name: N8N_EDITOR_BASE_URL
              value: "https://n8n.lab.vlxx.fr"
            - name: WEBHOOK_URL
              value: "https://n8n.lab.vlxx.fr"
          volumeMounts:
            - name: n8n-data
              mountPath: /home/node/.n8n
          resources:
            requests:
              memory: "250Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
      volumes:
        - name: n8n-data
          persistentVolumeClaim:
            claimName: n8n-pvc
